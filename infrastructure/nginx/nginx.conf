# AEGIS Nginx Configuration
# TLS 1.3 only, rate limiting, reverse proxy to FastAPI
#
# NOTE (Session 22): IMPL_22's FIX 1 also introduces an `upstream aegis_frontend`
# block and points `location /` at it. That container (aegis-frontend) does not
# exist yet — no frontend Docker service was ever created (Session 21's Part C
# was skipped; F01-F18 don't exist per DECISIONS_LOG.md DEC-047). An `upstream{}`
# block's server hostname is resolved once at nginx startup, not lazily per
# request — pointing it at a hostname with no DNS record would make nginx fail
# to start at all, a strictly worse outcome than the current (broken but
# harmless) `location /` below. Only the `/ws/` block is applied here; `location /`
# is left pointing at its existing (wrong-port, non-functional, but startable)
# target until a real frontend container exists to route to.

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: 60 requests per minute per user
    # Key: Authorization header (JWT token)
    limit_req_zone $http_authorization zone=aegis_ratelimit:10m rate=60r/m;

    # Upstream FastAPI application
    upstream aegis_backend {
        server aegis-fastapi:8000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        # TLS Configuration — TLS 1.3 only
        ssl_certificate /etc/nginx/ssl/aegis.crt;
        ssl_certificate_key /etc/nginx/ssl/aegis.key;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Maximum request body size (50MB for document uploads)
        client_max_body_size 50m;

        # WebSocket endpoint (MUST be before /api/ to prevent the catch-all
        # /api/ location from matching /ws/chat first)
        location /ws/ {
            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;

            # Required for the WebSocket upgrade handshake
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout — WebSocket connections stay open for minutes
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 10s;

            # Disable buffering for streaming
            proxy_buffering off;
        }

        # API routes — with rate limiting and burst
        location /api/ {
            # Apply rate limiting: 60/min, burst of 10 allowed
            limit_req zone=aegis_ratelimit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Admin API routes
        location /admin/ {
            limit_req zone=aegis_ratelimit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health check (no rate limiting)
        location /health {
            proxy_pass http://aegis_backend;
            proxy_read_timeout 10s;
        }

        # Frontend static files and Next.js routes
        location / {
            proxy_pass http://aegis-fastapi:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        # Block undefined paths
        location ~* \.(php|asp|aspx|cgi)$ {
            return 404;
        }
    }
}
